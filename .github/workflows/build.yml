name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Manifest via Python
        run: |
          mkdir -p app/src/main
          python3 -c "
          content = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <manifest xmlns:android=\"http://schemas.android.com/apk/res/xml/android\">
              <uses-permission android:name=\"android.permission.INTERNET\" />
              <application
                  android:label=\"Min Browser\"
                  android:usesCleartextTraffic=\"true\"
                  android:theme=\"@android:style/Theme.DeviceDefault.NoActionBar\">
                  <activity
                      android:name=\"com.example.minbrowser.MainActivity\"
                      android:exported=\"true\"
                      android:windowSoftInputMode=\"adjustResize\">
                      <intent-filter>
                          <action android:name=\"android.intent.action.MAIN\" />
                          <category android:name=\"android.intent.category.LAUNCHER\" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(content.strip())
          "

      - name: Initialize Wrapper and Build
        run: |
          # This creates the gradlew file that was missing in your logs
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release
          path: app/build/outputs/apk/debug/app-debug.apk
