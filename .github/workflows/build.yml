name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # This Action installs Gradle 8.5 properly without using the broken 9.4 system
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build APK
        run: |
          # We don't run 'gradle wrapper', we let the setup-gradle handle it
          # We call gradle directly now because it is forced to 8.5
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release
          path: app/build/outputs/apk/debug/app-debug.apk
