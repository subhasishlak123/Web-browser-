name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Force Reconstruct Project
        run: |
          # Delete everything to ensure no old files remain
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/example/minbrowser
          
          # Use Python to write files using HEX to avoid mobile keyboard corruption
          python3 -c "
          def write_hex(path, hex_str):
              with open(path, 'wb') as f:
                  f.write(bytes.fromhex(hex_str))

          # 1. Manifest file (Byte-perfect XML)
          manifest_hex = ''
          write_hex('app/src/main/AndroidManifest.xml', manifest_hex)

          # 2. settings.gradle
          with open('settings.gradle', 'w') as f: f.write(\"include ':app'\")
          
          # 3. gradle.properties
          with open('gradle.properties', 'w') as f: f.write('android.useAndroidX=true\nandroid.enableJetifier=true')
          "

      - name: Write build scripts
        run: |
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2'; classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.example.minbrowser'
              compileSdk 34
              defaultConfig { applicationId 'com.example.minbrowser'; minSdk 26; targetSdk 34; versionCode 1; versionName '1.0' }
              buildFeatures { compose true }
              composeOptions { kotlinCompilerExtensionVersion '1.5.1' }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.activity:activity-compose:1.8.2'
              implementation platform('androidx.compose:compose-bom:2023.10.01')
              implementation 'androidx.compose.ui:ui'
              implementation 'androidx.compose.material3:material3'
              implementation 'androidx.webkit:webkit:1.10.0'
          }
          EOF
          cat <<'EOF' > app/src/main/java/com/example/minbrowser/MainActivity.kt
          package com.example.minbrowser
          import android.os.Bundle
          import android.webkit.*
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.ui.viewinterop.AndroidView
          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      AndroidView(factory = { context ->
                          WebView(context).apply {
                              settings.javaScriptEnabled = true
                              loadUrl("https://www.google.com")
                          }
                      })
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release
          path: app/build/outputs/apk/debug/app-debug.apk
