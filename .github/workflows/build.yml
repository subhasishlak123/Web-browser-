name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Reconstruct Project
        run: |
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/example/minbrowser

          # 1. Recreate gradle.properties
          printf "android.useAndroidX=true\nandroid.enableJetifier=true\n" > gradle.properties

          # 2. Recreate settings.gradle
          printf "rootProject.name = 'MinBrowser'\ninclude ':app'\n" > settings.gradle

          # 3. Recreate root build.gradle
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 4. Recreate app/build.gradle
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.example.minbrowser'
              compileSdk 34
              defaultConfig { applicationId 'com.example.minbrowser'; minSdk 26; targetSdk 34; versionCode 1; versionName '1.0' }
              buildFeatures { compose true }
              composeOptions { kotlinCompilerExtensionVersion '1.5.1' }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.activity:activity-compose:1.8.2'
              implementation platform('androidx.compose:compose-bom:2023.10.01')
              implementation 'androidx.compose.ui:ui'
              implementation 'androidx.compose.material3:material3'
              implementation 'androidx.webkit:webkit:1.10.0'
          }
          EOF

          # 5. Generate Manifest via Hex (Immune to mobile keyboard errors)
          python3 -c "
          hex_data = ''
          import binascii
          # Fixing potential padding/typo in hex stream
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/xml/android\">\n    <uses-permission android:name=\"android.permission.INTERNET\" />\n    <application android:label=\"Min Browser\" android:usesCleartextTraffic=\"true\" android:theme=\"@android:style/Theme.DeviceDefault.NoActionBar\">\n        <activity android:name=\"com.example.minbrowser.MainActivity\" android:exported=\"true\">\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>')
          "

          # 6. Recreate MainActivity.kt
          cat <<'EOF' > app/src/main/java/com/example/minbrowser/MainActivity.kt
          package com.example.minbrowser
          import android.os.Bundle
          import android.webkit.*
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.layout.fillMaxSize
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.viewinterop.AndroidView
          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      AndroidView(modifier = Modifier.fillMaxSize(), factory = { context ->
                          WebView(context).apply {
                              settings.javaScriptEnabled = true
                              webViewClient = WebViewClient()
                              loadUrl("https://www.google.com")
                          }
                      })
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release
          path: app/build/outputs/apk/debug/app-debug.apk
