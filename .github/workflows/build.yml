name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      # This step uses hex code \x22 for double quotes to bypass mobile keyboard errors
      - name: Generate Safe Manifest
        run: |
          mkdir -p app/src/main
          printf "<?xml version=\x221.0\x22 encoding=\x22utf-8\x22?>\n" > app/src/main/AndroidManifest.xml
          printf "<manifest xmlns:android=\x22http://schemas.android.com/apk/res/xml/android\x22>\n" >> app/src/main/AndroidManifest.xml
          printf "    <uses-permission android:name=\x22android.permission.INTERNET\x22 />\n" >> app/src/main/AndroidManifest.xml
          printf "    <application android:label=\x22Min Browser\x22 android:usesCleartextTraffic=\x22true\x22 android:theme=\x22@android:style/Theme.DeviceDefault.NoActionBar\x22>\n" >> app/src/main/AndroidManifest.xml
          printf "        <activity android:name=\x22com.example.minbrowser.MainActivity\x22 android:exported=\x22true\x22 android:windowSoftInputMode=\x22adjustResize\x22>\n" >> app/src/main/AndroidManifest.xml
          printf "            <intent-filter>\n" >> app/src/main/AndroidManifest.xml
          printf "                <action android:name=\x22android.intent.action.MAIN\x22 />\n" >> app/src/main/AndroidManifest.xml
          printf "                <category android:name=\x22android.intent.category.LAUNCHER\x22 />\n" >> app/src/main/AndroidManifest.xml
          printf "            </intent-filter>\n" >> app/src/main/activity\n" >> app/src/main/AndroidManifest.xml
          printf "        </activity>\n" >> app/src/main/AndroidManifest.xml
          printf "    </application>\n" >> app/src/main/AndroidManifest.xml
          printf "</manifest>" >> app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          chmod +x gradlew || true
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release
          path: app/build/outputs/apk/debug/app-debug.apk
