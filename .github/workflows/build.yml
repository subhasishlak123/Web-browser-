name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Perfect Manifest
        run: |
          mkdir -p app/src/main
          echo "" | base64 -d > app/src/main/AndroidManifest.xml

      - name: Fix Project Permissions
        run: |
          # This creates the missing gradlew file to stop the error in your logs
          gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release
          path: app/build/outputs/apk/debug/app-debug.apk
